name: Release conformance cases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package case files with schema
        run: |
          cd inst/cases
          zip "../../cases-${{ steps.version.outputs.tag }}.zip" *.json
          cd ../../schema
          zip -g "../cases-${{ steps.version.outputs.tag }}.zip" cases.schema.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cases-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
