- id: binomial
  term: binomial
  short: >
    The distribution of the count of passes in a fixed number of
    independent trials with the same success probability.

- id: confidence-level
  term: confidence level
  short: >
    The long-run frequency with which the procedure's interval would
    cover the true parameter if the experiment were repeated under the
    same conditions. A property of the procedure, not of any single
    verdict.

- id: frequentist
  term: frequentist
  short: >
    Statistical inference in which probabilities describe long-run
    behaviour of procedures over repeated sampling, not degrees of
    belief about individual events.

- id: independence
  term: independence
  short: >
    The assumption that one trial's outcome does not influence
    another's. The model asks for approximate independence and records
    the assumption rather than assuming it away.

- id: one-sided-decision-rule
  term: one-sided decision rule
  short: >
    A test that asks whether evidence exceeds a single threshold in one
    direction only, rather than testing equality against a two-sided
    interval.

- id: percentile
  term: percentile
  short: >
    The value below which a stated fraction of observations fall.
    Latency is summarised by empirical percentiles (e.g. p95) because
    the upper tail is what users and SLAs care about.

- id: population
  term: population
  short: >
    The set of inputs and conditions about which a verdict is meant to
    generalise. Claims are only as strong as the population definition
    recorded alongside them.

- id: stationarity
  term: stationarity
  short: >
    The assumption that the underlying success rate does not drift over
    the period during which trials are collected. Assumed and
    documented, not proven.

- id: trial
  term: trial
  also_known_as: >
    Called a *sample* in the punit and feotest implementations. The two
    terms are synonymous in javai's vocabulary; this document uses
    *trial* in keeping with the statistical literature.
  short: >
    A single invocation of the service, evaluated against a criterion,
    yielding a pass or a fail. The basic unit of evidence in the
    functional model.

- id: wilson-score-bound
  term: Wilson score bound
  short: >
    A confidence bound on a binomial proportion that behaves well at
    extreme rates and small sample sizes, where the naive normal
    approximation fails. The model uses the Wilson lower bound for
    compliance decisions.
