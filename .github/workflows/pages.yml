name: Publish documents to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Convert documents to PDF
        env:
          PANDOC_IMAGE: pandoc/latex:3.9-ubuntu
        run: |
          mkdir -p _site
          PANDOC="docker run --rm -v ${PWD}:/data -w /data ${PANDOC_IMAGE}"

          $PANDOC docs/STATISTICAL-COMPANION.md \
            --from gfm+tex_math_dollars \
            --lua-filter=scripts/wrap-tables.lua \
            --lua-filter=scripts/breakable-code.lua \
            --include-in-header=scripts/pdf-footer.tex \
            -o _site/statistical-companion.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V documentclass=article \
            -V fontsize=11pt \
            -V mainfont="DejaVu Serif" \
            -V monofont="DejaVu Sans Mono" \
            --toc \
            --toc-depth=3 \
            -V title="Statistical Companion Document" \
            -V subtitle="Formal Statistical Foundations for the javai Methodology"

          $PANDOC docs/DISTRIBUTIONAL-CONTRACTS.md \
            --from gfm+tex_math_dollars \
            --lua-filter=scripts/wrap-tables.lua \
            --lua-filter=scripts/breakable-code.lua \
            --include-in-header=scripts/pdf-footer.tex \
            -o _site/distributional-contracts.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V documentclass=article \
            -V fontsize=11pt \
            -V mainfont="DejaVu Serif" \
            -V monofont="DejaVu Sans Mono" \
            --toc \
            --toc-depth=3 \
            -V title="Distributional Contracts for Stochastic Systems"

          $PANDOC docs/GLOSSARY.md \
            --from gfm+tex_math_dollars \
            --lua-filter=scripts/wrap-tables.lua \
            --lua-filter=scripts/breakable-code.lua \
            -o _site/glossary.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=1in \
            -V documentclass=article \
            -V fontsize=11pt \
            -V mainfont="DejaVu Serif" \
            -V monofont="DejaVu Sans Mono" \
            -V title="Glossary"

      - name: Render Statistical Model Overview to HTML fragment
        env:
          PANDOC_IMAGE: pandoc/latex:3.9-ubuntu
        run: |
          PANDOC="docker run --rm --user $(id -u):$(id -g) -v ${PWD}:/data -w /data ${PANDOC_IMAGE}"
          $PANDOC docs/STATISTICAL-MODEL-OVERVIEW.md \
            --from gfm \
            --to html5 \
            -o _overview-body.html
          # The banner supplies the page title; strip the document's leading <h1>.
          python3 - <<'PY'
          import re
          s = open('_overview-body.html').read()
          s = re.sub(r'<h1[^>]*>.*?</h1>\s*', '', s, count=1, flags=re.DOTALL)
          open('_overview-body.html', 'w').write(s)
          PY

      - name: Create index page
        run: |
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>javai-R — Documents</title>
            <meta name="description" content="Statistical foundations and reference data for the javai probabilistic testing methodology.">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
            <style>
              :root {
                --color-bg: #ffffff;
                --color-surface: #ebf6fb;
                --color-border: #dedede;
                --color-text: #181613;
                --color-text-secondary: #555555;
                --color-accent: #009ed6;
                --color-accent-hover: #007fb3;
                --color-dark: #0d0d0d;
                --color-white: #ffffff;
                --font-body: 'Lora', Georgia, 'Times New Roman', serif;
                --font-heading: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                --max-width: 1140px;
              }
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              html { scroll-behavior: smooth; }
              body {
                font-family: var(--font-body);
                color: var(--color-text);
                background: var(--color-bg);
                line-height: 1.7;
                font-size: 1.0625rem;
                -webkit-font-smoothing: antialiased;
              }
              .container { max-width: var(--max-width); margin: 0 auto; padding: 0 2.5rem; }
              a { color: var(--color-accent); text-decoration: none; transition: color 0.2s ease; }
              a:hover { color: var(--color-accent-hover); }

              /* Header */
              .site-header { background: var(--color-dark); position: sticky; top: 0; z-index: 100; }
              .site-header .container { display: flex; align-items: center; justify-content: space-between; height: 64px; }
              .site-logo { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; color: var(--color-white); letter-spacing: -0.02em; }
              .site-logo:hover { color: var(--color-accent); }
              .site-nav { display: flex; gap: 2rem; align-items: center; }
              .site-nav a { font-family: var(--font-ui); color: rgba(255,255,255,0.75); font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.25rem 0; border-bottom: 2px solid transparent; }
              .site-nav a:hover { color: var(--color-white); border-bottom-color: var(--color-accent); }

              /* Banner */
              .section-banner { position: relative; height: 220px; display: flex; align-items: center; overflow: hidden; background: var(--color-dark); }
              .section-banner .container { position: relative; z-index: 2; padding-top: 5rem; padding-bottom: 5rem; }
              .section-banner h1 { font-family: var(--font-heading); font-weight: 700; color: var(--color-white); font-size: 2.25rem; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
              .section-banner-sub { font-family: var(--font-body); color: rgba(255,255,255,0.75); font-size: 1.05rem; max-width: 560px; line-height: 1.6; }

              /* Content */
              .content { padding: 5rem 0; }
              .content-body { max-width: 760px; }
              .content-body p { color: var(--color-text-secondary); font-size: 1.1rem; line-height: 1.8; margin-bottom: 1rem; }
              .content-body strong { color: var(--color-text); }

              /* Overview prose */
              .overview { max-width: 760px; }
              .overview p { color: var(--color-text-secondary); font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.2rem; }
              .overview h1 { font-family: var(--font-heading); font-size: 1.9rem; font-weight: 700; color: var(--color-text); margin: 2.5rem 0 1rem; line-height: 1.2; letter-spacing: -0.01em; }
              .overview h2 { font-family: var(--font-heading); font-size: 1.45rem; font-weight: 600; color: var(--color-text); margin: 2.25rem 0 0.75rem; line-height: 1.3; }
              .overview h3 { font-family: var(--font-heading); font-size: 1.15rem; font-weight: 600; color: var(--color-text); margin: 1.5rem 0 0.5rem; }
              .overview ul, .overview ol { margin: 0 0 1.2rem 1.5rem; color: var(--color-text-secondary); font-size: 1.1rem; line-height: 1.8; }
              .overview li { margin-bottom: 0.4rem; }
              .overview li > strong:first-child { color: var(--color-text); }
              .overview strong { color: var(--color-text); }
              .overview blockquote { border-left: 4px solid var(--color-accent); padding: 0.75rem 1.25rem; margin: 1.75rem 0; font-style: italic; color: var(--color-text); background: var(--color-surface); }
              .overview blockquote p { color: var(--color-text); margin-bottom: 0; }
              .overview hr { border: none; border-top: 1px solid var(--color-border); margin: 2.5rem 0; }
              .overview code { font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace; background: var(--color-surface); padding: 0.1em 0.4em; border-radius: 3px; font-size: 0.9em; }
              .overview a { border-bottom: 1px solid currentColor; }

              /* Reference materials */
              .references { margin-top: 5rem; }
              .references > h2 { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; color: var(--color-text); margin-bottom: 0.5rem; letter-spacing: -0.01em; }
              .references > p { color: var(--color-text-secondary); font-size: 1.05rem; margin-bottom: 2rem; max-width: 760px; line-height: 1.7; }

              /* Document cards */
              .doc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 0; }
              .doc-card { background: var(--color-surface); border: 1px solid var(--color-border); border-left: 5px solid var(--color-accent); padding: 1.75rem; }
              .doc-card h3 { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; color: var(--color-text); margin-bottom: 0.5rem; line-height: 1.3; }
              .doc-card p { color: var(--color-text-secondary); font-size: 0.92rem; line-height: 1.65; margin-bottom: 1.25rem; }
              .doc-card .btn { display: inline-block; font-family: var(--font-ui); padding: 0.7em 1.8em; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.03em; text-transform: uppercase; border: 2px solid var(--color-accent); background: var(--color-accent); color: var(--color-white); transition: all 0.2s ease; }
              .doc-card .btn:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); color: var(--color-white); }

              /* Footer */
              .site-footer { background: var(--color-dark); color: rgba(255,255,255,0.6); padding: 3rem 0; font-family: var(--font-ui); font-size: 0.85rem; }
              .site-footer .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
              .site-footer a { color: rgba(255,255,255,0.6); }
              .site-footer a:hover { color: var(--color-white); }
              .footer-links { display: flex; gap: 2rem; }

              @media (max-width: 768px) {
                .container { padding: 0 1.25rem; }
                .site-header .container { flex-direction: column; height: auto; padding-top: 1rem; padding-bottom: 1rem; gap: 0.5rem; }
                .site-nav { gap: 1rem; flex-wrap: wrap; justify-content: center; }
                .section-banner { height: 180px; }
                .section-banner h1 { font-size: 1.75rem; }
                .doc-grid { grid-template-columns: 1fr; gap: 1rem; }
                .site-footer .container { flex-direction: column; text-align: center; }
              }
            </style>
          </head>
          <body>
            <header class="site-header">
              <div class="container">
                <a href="https://javai.org" class="site-logo">Javai</a>
                <nav class="site-nav">
                  <a href="https://javai.org/projects/">Projects</a>
                  <a href="https://javai.org/posts/">Posts</a>
                </nav>
              </div>
            </header>

            <section class="section-banner">
              <div class="container">
                <h1>javai-R</h1>
                <p class="section-banner-sub">A practical summary of the javai statistical model.</p>
              </div>
            </section>

            <section class="content">
              <div class="container">
                <article class="overview">
          __OVERVIEW_BODY__
                </article>

                <section class="references">
                  <h2>Reference materials</h2>
                  <p>The companion documents below provide the formal foundations underlying the summary above.</p>
                  <div class="doc-grid">
                    <div class="doc-card">
                      <h3>Statistical Companion</h3>
                      <p>
                        Primarily for statisticians, the formal foundations of the javai
                        methodology. Covers hypothesis testing, confidence intervals, power
                        analysis, threshold derivation, and latency percentile analysis.
                      </p>
                      <a href="statistical-companion.pdf" class="btn">Download PDF</a>
                    </div>
                    <div class="doc-card">
                      <h3>Distributional Contracts</h3>
                      <p>
                        For software language professionals. Extends Design by Contract to
                        stochastic systems, lifting postconditions from Boolean predicates
                        over individual executions to statistical assertions over repeated
                        executions.
                      </p>
                      <a href="distributional-contracts.pdf" class="btn">Download PDF</a>
                    </div>
                    <div class="doc-card">
                      <h3>Glossary</h3>
                      <p>
                        Terminology used across the javai project family, defined in the
                        context of the distributional contract methodology.
                      </p>
                      <a href="glossary.pdf" class="btn">Download PDF</a>
                    </div>
                  </div>
                </section>
              </div>
            </section>

            <footer class="site-footer">
              <div class="container">
                <p>&copy; 2026 Javai. All rights reserved.</p>
                <p class="footer-links">
                  <a href="https://github.com/javai-org">GitHub</a>
                  <a href="https://github.com/javai-org/javai-R">javai-R</a>
                </p>
              </div>
            </footer>
          </body>
          </html>
          HTMLEOF

          python3 - <<'PY'
          body = open('_overview-body.html').read()
          html = open('_site/index.html').read()
          open('_site/index.html', 'w').write(html.replace('__OVERVIEW_BODY__', body))
          PY
          rm _overview-body.html

      - name: Add CNAME for custom domain
        run: echo "r.javai.org" > _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
